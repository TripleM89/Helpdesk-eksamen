<!DOCTYPE html>
<html lang="no">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn HelpDesk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-side">

  <div class="login-boks">
    <h1>HelpDesk</h1>
    <p>Elvebakken VGS  IT-avdelingen</p>

    <p id="login-feil" class="hidden feil-melding">Feil brukernavn eller passord.</p>

    <label for="brukernavn">Brukernavn</label>

    <label for="passord">Passord</label>
    <input type="password" id="passord" />

    <button id="logg-inn-btn">Logg inn</button>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
